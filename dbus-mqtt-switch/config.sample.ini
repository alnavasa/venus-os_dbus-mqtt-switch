# dbus-mqtt-switch — config.sample.ini
# =====================================
# Copy this file to config-{name}.ini and edit the values.
# Example:  cp config.sample.ini config-salon.ini
#
# Each config-{name}.ini becomes a separate Venus OS device.
# Run install.sh to auto-create and start all services.
#
# Examples:
#   config-light1.ini   → service dbus-mqtt-switch-light1
#   config-salon.ini    → service dbus-mqtt-switch-salon
#   config-cockpit.ini  → service dbus-mqtt-switch-cockpit
#
# Each must have a unique device_instance value (200-255).

[DEFAULT]

# Log level: WARNING (default) | INFO | DEBUG | ERROR
logging = WARNING

# Name shown in Venus OS GUI
device_name = MQTT Switch

# Unique number for this device (100-255). Each instance must be different.
device_instance = 200

# Seconds without MQTT message before the driver stops.
# Set to 0 to disable timeout (not recommended — device may appear
# online in Venus OS even when the physical device is disconnected).
timeout = 120

# Output type — controls how Venus OS renders this device:
#   1  = toggle   (simple on/off switch)
#   2  = dimmable (on/off + brightness slider 0-100%)
#   11 = RGB      (on/off + brightness + color RGB)
#   12 = CCT      (on/off + brightness + color temperature)
#   13 = RGBW     (on/off + brightness + color RGB + white channel)
type = 1


[MQTT]

# IP or hostname of the MQTT broker.
# For the Cerbo GX local broker use 127.0.0.1
broker_address = 127.0.0.1
broker_port    = 1883

# State topic: the driver subscribes here to receive the current state
# from the physical device.
#
# Expected payload (JSON):
#   {"state": 1}                                                      ← type 1
#   {"state": 1, "dimming": 75}                                       ← type 2
#   {"state": 1, "red": 255, "green": 128, "blue": 0, "dimming": 75} ← type 11
#   {"state": 1, "colortemp": 2700, "dimming": 75}                   ← type 12 (colortemp en Kelvin)
#   {"state": 1, "red": 255, "green": 128, "blue": 0, "white": 100, "dimming": 75} ← type 13
#   {"state": 0}                                                      ← off (any)
#
topic = home/switch/device1

# Command topic: the driver publishes here when the user changes
# the switch/slider in Venus OS GUI.
# The physical device (e.g. ESP32) should subscribe to this topic.
#
# Default: <topic>/set  (e.g. home/switch/device1/set)
# Uncomment and change only if you need a custom topic.
#
# topic_command = home/switch/device1/set


