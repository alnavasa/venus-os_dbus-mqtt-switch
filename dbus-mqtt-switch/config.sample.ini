# dbus-mqtt-switch — config.sample.ini
# =====================================
# Copy this file to config-{name}.ini and edit the values.
# Example:  cp config.sample.ini config-salon.ini
#
# Each config-{name}.ini becomes a separate Venus OS device.
# Run install.sh to auto-create and start all services.
#
# Examples:
#   config-light1.ini   → service dbus-mqtt-switch-light1
#   config-salon.ini    → service dbus-mqtt-switch-salon
#   config-cockpit.ini  → service dbus-mqtt-switch-cockpit
#
# Each must have a unique device_instance value (100-255).
#
# IMPORTANT — Persistence of names and groups:
#   device_name, custom_name and group are read from this file every time
#   the driver starts. Changes you make from the Venus OS GUI v2 switch pane
#   (right-click → Edit) are runtime-only and will be reset when the service
#   restarts (e.g. when the physical device disconnects/reconnects, or the
#   Cerbo reboots).
#
#   To rename a switch or move it to a different group permanently:
#     1. Edit this file (device_name / custom_name / group)
#     2. Restart the service:  /data/etc/dbus-mqtt-switch/restart.sh
#
#   This is the same approach used by mr-manuel's other dbus-mqtt-* drivers
#   and avoids touching Victron's localsettings database.

[DEFAULT]

# Log level: WARNING (default) | INFO | DEBUG | ERROR
logging = WARNING

# device_name = ProductName + breadcrumb name in Venus OS GUI.
# Shown in the device list and in the breadcrumb when you open the device.
# Example: "Cabin Light", "Bilge Pump", "Anchor Light".
device_name = MQTT Switch

# custom_name = output label shown INSIDE the switch card on the GUI v2 switch pane.
# This is the friendly name the user sees on the main switch view.
# If omitted, defaults to a type-based label: "Virtual Toggle", "Virtual Dimmer",
# "Virtual RGB", "Virtual CCT", "Virtual RGBW".
# custom_name = My Light

# group = group label in the Venus OS GUI v2 switch pane.
# All switches sharing the same group are shown together.
# Examples: "Cabin", "Cockpit", "Engine Room", "Mast".
group = Lights

# Unique number for this device (100-255). Each instance must be different.
device_instance = 200

# Seconds without MQTT message before the driver stops and the device
# disappears from the GUI. Acts as a safety net in case the LWT mechanism
# fails. A reasonable value is 1.5× your device's state-publish interval.
# Set to 0 to disable timeout (NOT recommended — device may appear online
# in Venus OS even when the physical device is unreachable).
timeout = 45

# Output type — controls how Venus OS renders this device:
#   1  = toggle   (simple on/off switch)
#   2  = dimmable (on/off + brightness slider 0-100%)
#   11 = RGB      (on/off + brightness + color RGB)
#   12 = CCT      (on/off + brightness + color temperature)
#   13 = RGBW     (on/off + brightness + color RGB + white channel)
type = 1


[MQTT]

# IP or hostname of the MQTT broker.
# For the Cerbo GX local broker use 127.0.0.1
broker_address = 127.0.0.1
broker_port    = 1883

# State topic: the driver subscribes here to receive the current state
# from the physical device.
#
# Expected payload (JSON):
#   {"state": 1}                                                              ← type 1
#   {"state": 1, "dimming": 75}                                               ← type 2
#   {"state": 1, "red": 255, "green": 128, "blue": 0, "dimming": 75}          ← type 11
#   {"state": 1, "colortemp": 2700, "dimming": 75}                            ← type 12 (Kelvin)
#   {"state": 1, "red": 255, "green": 128, "blue": 0, "white": 100, "dimming": 75} ← type 13
#   {"state": 0}                                                              ← off (any)
#
topic = home/switch/device1

# Command topic: the driver publishes here when the user changes
# the switch/slider in Venus OS GUI.
# The physical device (e.g. ESP32) should subscribe to this topic.
#
# Default: <topic>/set  (e.g. home/switch/device1/set)
# Uncomment and change only if you need a custom topic.
#
# topic_command = home/switch/device1/set

# ── Optional: availability / LWT topic ───────────────────────────────────────
# Topic where the broker publishes the device's online/offline status
# (Last Will and Testament). Standard MQTT pattern used by ESPHome, Shelly,
# Tasmota and Home Assistant. Enables instant disconnect detection: the
# driver exits and the device disappears from the GUI when the physical
# device is unreachable, and reappears with the correct state when it
# comes back online.
#
# Examples:
#   ESPHome:  availability_topic = <node_name>/status
#             payload_available  = online   (default)
#             payload_unavailable = offline (default)
#   Shelly:   availability_topic = shellies/<device-id>/online
#             payload_available  = true
#             payload_unavailable = false
#   Tasmota:  availability_topic = tele/<device-id>/LWT
#             payload_available  = Online
#             payload_unavailable = Offline
#
# Leave commented to use timeout-based detection only.
#
# availability_topic  = home/switch/device1/status
# payload_available   = online
# payload_unavailable = offline


# ── Optional: authentication ──────────────────────────────────────────────────
# username =
# password =

# ── Optional: TLS ─────────────────────────────────────────────────────────────
# tls_enabled    = 0
# tls_path_to_ca = /path/to/ca.crt
# tls_insecure   = 0
