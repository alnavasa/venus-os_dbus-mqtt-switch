# dbus-mqtt-switch — Switch 1 (toggle switch)
# =============================================
# ESP32-C6 virtual switch (display page 3) → Venus OS type 1

[DEFAULT]
logging         = WARNING

# device_name  = ProductName + breadcrumb name in Venus OS GUI ("Switch 1" in device list)
device_name     = Switch 1

# custom_name  = output label shown inside the switch card (e.g. "Cabin Light")
# Edit here and restart the service to change. GUI edits are runtime-only.
custom_name     = Toggle 1

# group        = group label shown in Venus OS GUI v2 switch pane
# Edit here and restart the service. GUI edits are runtime-only.
group           = Lights

device_instance = 200
timeout         = 45
type            = 1

[MQTT]
broker_address     = 127.0.0.1
broker_port        = 1883
topic              = triaca/switch/light1
# LWT: ESPHome publishes online/offline here → instant disconnect detection
availability_topic = c6venustest/status
