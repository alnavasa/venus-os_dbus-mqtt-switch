# dbus-mqtt-switch — Switch 2 (dimmable backlight)
# ==================================================
# ESP32-C6 PWM backlight → Venus OS type 2 (dimmable)

[DEFAULT]
logging         = WARNING

# device_name  = ProductName + breadcrumb name in Venus OS GUI
device_name     = Switch 2

# custom_name  = output label shown inside the switch card.
# Edit here and restart the service. GUI edits are runtime-only.
custom_name     = Dimmer 2

# group        = group label shown in Venus OS GUI v2 switch pane.
# Edit here and restart the service. GUI edits are runtime-only.
group           = Lights

device_instance = 201
timeout         = 45
type            = 2

[MQTT]
broker_address     = 127.0.0.1
broker_port        = 1883
topic              = triaca/switch/light2
availability_topic = c6venustest/status
